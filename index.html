<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airline Login</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Background -->
    <div class="background"></div>


    <!-- Login Container -->
    <div class="login-card">

        <div class="logo">
            ✈️
        </div>

        <h1>Welcome Back</h1>
        <p>Login to continue your journey</p>


        <form>

            <div class="input-box">
                <input type="email" required>
                <label>Email Address</label>
            </div>


            <div class="input-box">
                <input type="password" required>
                <label>Password</label>
            </div>


            <div class="options">

                <label>
                    <input type="checkbox">
                    Remember me
                </label>

                <a href="#">
                    Forgot Password?
                </a>

            </div>


            <button type="submit">
                Login
            </button>


            <div class="signup">
                Don't have an account?
                <a href="signup.html">
                    Create Account
                </a>
            </div>


        </form>

    </div>


</body>
</html>
